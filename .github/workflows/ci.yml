name: CI_TF1

on:
  push:
    paths:
      - 'deepctr/**'
      - 'tests/**'
      - 'setup.py'
      - 'setup.cfg'
      - '.github/workflows/**'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.7"
            tf-version: "1.15.5"

    steps:
      - uses: actions/checkout@v5

      - name: Setup python environment
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install -q --upgrade pip setuptools wheel
          python -m pip install -q "numpy<2"
          python -m pip install -q tensorflow==${{ matrix.tf-version }}
          python -m pip install -q protobuf==3.19.0
          python -m pip install -q pytest pytest-cov
          python -m pip install -e .
          python -m pip check

      - name: Test with pytest
        timeout-minutes: 240
        run: |
          pytest --cov=deepctr --cov-report=xml --cov-report=term-missing:skip-covered

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: pytest
          name: py${{ matrix.python-version }}-tf${{ matrix.tf-version }}
